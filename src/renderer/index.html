<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>ZapretMac</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
        </div>
        <div>
          <h1>ZapretMac</h1>
          <p class="subtitle">YouTube для macOS</p>
        </div>
      </div>
      <div class="status-badge" id="statusBadge">Отключено</div>
    </header>

    <main class="main">
      <section class="power-section">
        <button class="power-btn" id="powerBtn" aria-label="Включить/выключить">
          <div class="power-ring" id="powerRing">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v10M18.36 6.64a9 9 0 1 1-12.73 0"/>
            </svg>
          </div>
        </button>
        <p class="power-label" id="powerLabel">Нажмите для включения</p>
        <p class="strategy-active" id="activeStrategy"></p>
      </section>

      <section class="card">
        <label class="card-label" for="strategySelect">Стратегия (ALT)</label>
        <select id="strategySelect" class="select">
          <option value="auto">Авто — подбор рабочей стратегии</option>
        </select>
        <p class="hint" id="strategyHint">Авто перебирает стратегии по одной. Журнал: Копировать или Файл.</p>
      </section>

      <section class="card settings-card">
        <label class="toggle-row">
          <span>Автозапуск при входе</span>
          <input type="checkbox" id="autoStart">
          <span class="toggle-slider"></span>
        </label>
        <label class="toggle-row">
          <span>Подключаться автоматически</span>
          <input type="checkbox" id="autoConnect">
          <span class="toggle-slider"></span>
        </label>
      </section>

      <section class="card progress-card hidden" id="progressCard">
        <div class="progress-text" id="progressText">Поиск стратегии...</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </section>

      <section class="card log-card">
        <div class="log-header">
          <span>Журнал</span>
          <div class="log-actions">
            <button class="btn-text" id="copyLog" type="button">Копировать</button>
            <button class="btn-text" id="openLog" type="button">Файл</button>
            <button class="btn-text" id="clearLog" type="button">Очистить</button>
          </div>
        </div>
        <div class="log" id="log"></div>
      </section>
    </main>

    <footer class="footer">
      <p>Порт <a href="https://github.com/Flowseal/zapret-discord-youtube">Flowseal/zapret-discord-youtube</a> для macOS</p>
      <p class="warning">port by taganovv</p>
    </footer>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
